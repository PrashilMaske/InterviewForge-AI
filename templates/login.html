{% extends 'base.html' %}

{% block title %}Login - InterviewForge AI{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 60px auto;" class="glass-container">
    <h2 style="text-align: center; margin-bottom: 24px;">Sign In to Forge</h2>
    
    {% if error %}
        <div style="background: rgba(248, 113, 113, 0.1); border: 1px solid var(--text-red); border-radius: 8px; padding: 12px; color: var(--text-red); margin-bottom: 20px; font-size: 14px; text-align: center;">
            {{ error }}
        </div>
    {% endif %}
    
    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted);">Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
        </div>
        
        <div style="margin-bottom: 24px;">
            <label style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted);">Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%; padding: 12px; font-size: 15px;">Sign In</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px; font-size: 14px;">
        <p>Don't have an account? <a href="{% url 'register' %}" style="color: var(--accent-primary); text-decoration: none;">Sign up here</a></p>
    </div>
</div>
{% endblock %}
