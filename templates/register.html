{% extends 'base.html' %}

{% block title %}Register - InterviewForge AI{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 60px auto;" class="glass-container">
    <h2 style="text-align: center; margin-bottom: 24px;">Create Candidate Account</h2>
    
    {% if error %}
        <div style="background: rgba(248, 113, 113, 0.1); border: 1px solid var(--text-red); border-radius: 8px; padding: 12px; color: var(--text-red); margin-bottom: 20px; font-size: 14px; text-align: center;">
            {{ error }}
        </div>
    {% endif %}
    
    <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted);">Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required>
        </div>

        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted);">Username</label>
            <input type="text" name="username" placeholder="Choose username" required>
        </div>
        
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted);">Password</label>
            <input type="password" name="password" placeholder="Create password" required>
        </div>

        <div style="margin-bottom: 24px;">
            <label style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted);">Join As</label>
            <select name="role" required>
                <option value="candidate" selected>Candidate (Prepare for interviews)</option>
                <option value="recruiter">Recruiter (Post jobs and evaluate talent)</option>
            </select>
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%; padding: 12px; font-size: 15px;">Create Account</button>
    </form>
    
    <div style="text-align: center; margin-top: 20px; font-size: 14px;">
        <p>Already have an account? <a href="{% url 'login' %}" style="color: var(--accent-primary); text-decoration: none;">Sign in here</a></p>
    </div>
</div>
{% endblock %}
